name: FreeBSD

on:
  workflow_dispatch:

jobs:
  freebsd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: naviserver-project/naviserver
          fetch-depth: 0

      - name: Build and test on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          mem: 4096
          cpu: 2
          prepare: |
            ABI=$(pkg config ABI)
            mkdir -p /usr/local/etc/pkg/repos
            rm -rf /var/db/pkg/repos/*

            cat > /usr/local/etc/pkg/repos/FreeBSD.conf <<'EOF'
            FreeBSD: { enabled: no }
            EOF

            cat > /usr/local/etc/pkg/repos/FreeBSD-ports-kmods.conf <<'EOF'
            FreeBSD-ports-kmods: { enabled: no }
            EOF

            for mirror in \
              "http://pkg0.nyi.freebsd.org" \
              "http://pkg.FreeBSD.org" \
              "https://mirror.leaseweb.com/freebsd"
            do
              echo "Trying mirror $mirror"

              cat > /usr/local/etc/pkg/repos/FreeBSD-ports.conf <<EOF
            FreeBSD-ports: {
              url: "$mirror/${ABI}/latest",
              mirror_type: "none",
              signature_type: "fingerprints",
              fingerprints: "/usr/share/keys/pkg",
              enabled: yes
            }
            EOF

              rm -rf /var/db/pkg/repos/*
              if pkg update -f && pkg install -y bash git gmake; then
                break
              fi
            done

            #mkdir -p /usr/local/etc/pkg/repos
            #cat > /usr/local/etc/pkg/repos/FreeBSD.conf <<'EOF'
            #FreeBSD: {
            #  url: "https://pkg0.nyi.freebsd.org/FreeBSD:15:amd64/latest",
            #  mirror_type: "none",
            #  signature_type: "fingerprints",
            #  fingerprints: "/usr/share/keys/pkg",
            #  enabled: yes
            #  }
            #EOF

            pkg update -f
            pkg install -y bash git gmake
            git clone https://github.com/gustafn/install-ns.git

          run: |
            set -e

            echo "=== System ==="
            uname -a
            freebsd-version
            gmake --version

            cd install-ns
            env \
              version_ns=.. \
              version_modules=GIT \
              version_tcl=core-8-6-17 \
              version_tcllib= \
              version_xotcl=2.4.0 \
              version_tdom=0.9.6 \
              ns_modules="" \
              with_ns_deprecated=1 \
              CC=gcc \
              with_postgres=0 \
              with_postgres_driver=1 \
              with_ns_doc=0 \
              bash install-ns.sh build

            gmake -C .. CHOWN=/usr/sbin/chown test
            rc=$?
            set -e

            echo "gmake rc=$rc"

            if [ "$rc" = "2" ]; then
              echo "Treating gmake rc=2 as success for BSD post-test SIGTERM"
              rc=0
            fi
            exit $rc
