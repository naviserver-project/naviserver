name: FreeBSD

on:
  workflow_dispatch:

jobs:
  freebsd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: naviserver-project/naviserver
          fetch-depth: 0

      - name: Build and test on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          mem: 4096
          cpu: 2
          prepare: |
            pkg update
            pkg install -y \
              bash \
              curl \
              git \
              gmake \
              gcc \
              openssl \
              gtar \
              zip \
              unzip \
              wget

            git clone https://github.com/gustafn/install-ns.git
          run: |
            set -e

            echo "=== System ==="
            uname -a
            freebsd-version
            openssl version
            gcc --version || true
            gmake --version

            cd install-ns

            env \
              version_ns=.. \
              version_modules=GIT \
              version_tcl=core-8-6-17 \
              version_tcllib= \
              version_xotcl=2.4.0 \
              version_tdom=0.9.6 \
              ns_modules="" \
              with_ns_deprecated=1 \
              CC=gcc \
              make=gmake \
              tar=gtar \
              with_postgres=0 \
              with_postgres_driver=1 \
              with_ns_doc=0 \
              bash install-ns.sh build

            cd ../naviserver
            gmake test
