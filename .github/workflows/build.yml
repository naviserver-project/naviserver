name: Build

on: [push, workflow_dispatch]

jobs:
  naviserver:
    runs-on: ${{ matrix.os }}
    env:
      CC:              ${{ matrix.compiler }}
      #CC:              "ccache ${{ matrix.compiler }}"
      TCLTAG:          ${{ matrix.tcltag }}
      TCLLIB_VERSION:  ${{ matrix.tcllib_version }}
      NSF_VERSION:     ${{ matrix.nsf_version }}
      NS_MODULES:      ${{ matrix.ns_modules }}
      TDOM_VERSION:    ${{ matrix.tdom_version }}
      WITH_DEPRECATED: ${{ matrix.with_deprecated }}
      CCACHE_DIR:      ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:  500M

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc-14
            tcltag: core-8-6-17
            nsf_version: 2.3.0
            tdom_version: 0.9.1
            with_deprecated: 1

          - os: ubuntu-22.04
            compiler: gcc
            tcltag: core-8-6-17
            nsf_version: 2.4.0
            tdom_version: 0.9.6
            with_deprecated: 0

          - os: ubuntu-latest
            compiler: gcc-12
            tcltag: core-8-7-a5
            ns_modules: nsdbpg nsdbi nsdbipg nsudp nscoap nssmtpd nsauthpam
            nsf_version: 2.4.0
            tdom_version: 0.9.5
            with_deprecated: 1

          #- os: ubuntu-latest
          #  compiler: gcc-12
          #  tcltag: main
          #  ns_modules: nsdbpg nsdbi nsdbipg nsudp nscoap nssmtpd nsloopctl
          #  nsf_version: HEAD
          #  tdom_version: trunk
          #  with_deprecated: 1

          - os: ubuntu-latest
            compiler: gcc-13
            tcltag: core-8-5-branch
            nsf_version: HEAD
            tcllib_version: "2.0"
            ns_modules: nsdbpg nsdbi nsdbipg nsudp nscoap nssmtpd nsloopctl nsauthpam
            tdom_version: 0.9.5
            with_deprecated: 1

          - os: ubuntu-latest
            compiler: gcc-14
            tcltag: 9.0.3
            nsf_version: HEAD
            tcllib_version: "2.0"
            ns_modules: nsdbpg nsdbi nsdbipg nsudp nscoap nssmtpd nsloopctl nsauthpam
            tdom_version: 0.9.6
            with_deprecated: 0
            makeflags_override: "-j1"

    defaults:
      run:
        shell: bash

    steps:
      - name: Intro
        run: |
          echo GITHUB_REF=${GITHUB_REF} PWD=`pwd`

      - name: Install Linux dependencies (debugging)
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${CC} libpam0g-dev ccache

      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: naviserver-project/naviserver

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.os }}-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Check IP
        run: curl -ks https://api.ipify.org

      - name: Show what we have now
        run: |
          git clone https://github.com/gustafn/install-ns.git
          echo GITHUB_REF=${GITHUB_REF} PWD=`pwd`
          cat /etc/os-release
          ls -ltr

      - name: Set MAKEFLAGS for parallel build
        run: |
          CORES="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu || echo 1)"
          DEFAULT_FLAGS="-j${CORES} -Oline"

          if [ -n "${{ matrix.makeflags_override }}" ]; then
            echo "MAKEFLAGS=${{ matrix.makeflags_override }}" >> "$GITHUB_ENV"
          else
            echo "MAKEFLAGS=${DEFAULT_FLAGS}" >> "$GITHUB_ENV"
          fi

      - name: Enable ccache wrappers
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          echo "PATH=$PATH" >> "$GITHUB_ENV"

      - name: Check ccache compiler resolution
        run: |
          echo "CC=${CC}"
          which ${CC} || true
          type -a ${CC} || true
          ls -l /usr/lib/ccache/${CC} || true
          ccache -z

      - name: Check compiler resolution under sudo
        run: |
          sudo env \
          PATH="/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin" \
          CC="${CC}" \
          bash -c 'echo PATH=$PATH; which "$CC"; type -a "$CC" || true'

      - name: Compile all
        run: |
          sudo env \
            PATH="/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin" \
            NS_INSTALL_DEBUG_ENV=1 \
            CCACHE_DIR="${CCACHE_DIR}" \
            CCACHE_MAXSIZE="${CCACHE_MAXSIZE}" \
            MAKEFLAGS="${MAKEFLAGS}" \
            version_ns=.. \
            version_modules=GIT \
            version_tcl=${TCLTAG} \
            version_tcllib=${TCLLIB_VERSION} \
            version_xotcl=${NSF_VERSION} \
            version_tdom=${TDOM_VERSION} \
            ns_modules="${NS_MODULES}" \
            with_ns_deprecated="${WITH_DEPRECATED}" \
            CC=${CC} \
            with_postgres=0 \
            with_postgres_driver=1 \
            with_ns_doc=0 \
            bash install-ns.sh build
        working-directory: install-ns

      - name: Show ccache stats
        run: |
          ccache -s

      #- name: Show cache contents
      #  run: |
      #    echo "CCACHE_DIR=$CCACHE_DIR"
      #    find "$CCACHE_DIR" -maxdepth 2 -type f | head -20 || true

      - name: Regression test
        run: |
          make test

# Reference of the GitHub runner images with the supported packages and versions
# https://github.com/actions/runner-images
